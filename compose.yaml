# compose.yaml
# compose file for the ABP plugin
# written by Aaron Krapes
# Apr 9, 2026

services:
  plugin-abp:
    container_name: plugin-abp
    image: ghcr.io/abeonasec/plugin-abp:latest
    cap_add:
      - CAP_NET_RAW # needs socket access to bind interfaces
    networks:
    - plugin-abp-bridge
    - abeonasec-internal
    depends_on:
    - plugin-test

networks:
  plugin-abp-bridge:
    external: true # use pre-existing network
  abeonasec-internal:
    external: true
