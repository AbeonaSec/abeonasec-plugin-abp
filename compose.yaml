services:
  abeonasec-plugin-abp:
    container_name: abeonasec-plugin-abp
    build:
      context: .
      dockerfile: plugin-abp.Dockerfile
      args:
        PIPE_IN_PORT: ${PIPE_IN_PORT}
        NET_IF: ${NET_IF}
    ports:
    - "${PIPE_IN_PORT}"
    networks:
    - plugin-abp-bridge
    - internal # needs to communicate inside the pod
networks:
  internal: {}
  plugin-abp-bridge:
    external: true # use pre-existing network