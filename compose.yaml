# compose.yaml
# compose file for the ABP plugin
# written by Aaron Krapes
# Feb 9, 2026

services:
  abeonasec-plugin-abp:
    container_name: abeonasec-plugin-abp
    build:
      context: .
      dockerfile: plugin-abp.Dockerfile
      args:
        PIPE_IN_PORT: ${PIPE_IN_PORT}
        NET_IF: ${NET_IF}
    user: 1000 # running script as root so must specify user in compose
    devices:
      - nvidia.com/gpu=all
    ports:
    - "${PIPE_IN_PORT}"
    networks:
    - plugin-abp-bridge
    - internal # needs to communicate inside the pod
networks:
  internal: {}
  plugin-abp-bridge:
    external: true # use pre-existing network