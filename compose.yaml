  triton:
    container_name: triton
    image: nvcr.io/nvidia/morpheus/morpheus-tritonserver-models:25.02    
    devices:
    - nvidia.com/gpu=all
    ports:
    - "8000:8000"
    command: > 
      tritonserver --model-repository=/models/triton-model-repo
      --exit-on-error=false 
      --log-info=true
      --strict-readiness=false
      --disable-auto-complete-config
    networks:
    - podman
  
  kafka: # single node kafka cluster
    image: docker.io/apache/kafka:latest
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_CONTAINER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_CONTAINER://host.containers.internal:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_CONTAINER://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - /var/lib/abeonasec/kafka/data:/tmp/kraft-combined-logs
    networks:
    - podman

  abeonasec-es01: # single node elasticsearch cluster
    container_name: abeonasec-es01
    image: docker.elastic.co/elasticsearch/elasticsearch-wolfi:9.3.0
    volumes:
    - /var/lib/abeonasec/elasticsearch/data:/usr/share/elasticsearch/data
    - /opt/abeonasec/certs:/usr/share/elasticsearch/config/certs
    # - /etc/abeonasec/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    networks:
    - podman
    ports:
    - "9200:9200" # default elasticsearch port
    environment:
    - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    - bootstrap.memory_lock=true
    - node.name=abeonasec-es01
    - discovery.type=single-node
    - cluster.name=abeonasec-es-cluster
    - bootstrap.memory_lock=true
    - xpack.security.enabled=true
    - xpack.security.http.ssl.enabled=true
    - xpack.security.http.ssl.key=certs/abeonasec-es01/abeonasec-es01.key
    - xpack.security.http.ssl.certificate=certs/abeonasec-es01/abeonasec-es01.crt
    - xpack.security.http.ssl.certificate_authorities=certs/ca/ca.crt
    - xpack.security.transport.ssl.enabled=true
    - xpack.security.transport.ssl.key=certs/abeonasec-es01/abeonasec-es01.key
    - xpack.security.transport.ssl.certificate=certs/abeonasec-es01/abeonasec-es01.crt
    - xpack.security.transport.ssl.certificate_authorities=certs/ca/ca.crt
    - xpack.security.transport.ssl.verification_mode=certificate
    # the following are environment variables needed to enable elasticvue 
    # to access the cluster and can be removed later
    - http.cors.enabled=true
    - http.cors.allow-origin=/.*/
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s --cacert config/certs/ca/ca.crt https://host.containers.internal:9200 | grep -q 'missing authentication credentials'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped
  
  DEV-abeonasec-elasticvue:
    container_name: DEV-abeonasec-elasticvue
    image: docker.io/cars10/elasticvue:latest
    ports:
      - "8080:8080" # exposed to host for viewing
    networks:
    - podman
    environment:
    - ELASTICVUE_CLUSTERS='[{"name":"abeonasec-es-cluster", "uri":"https://localhost:9200"}]'
    depends_on:
    - abeonasec-es01
    restart: unless-stopped

networks:
  plugin-abp-bridge:
    external: true # use pre-existing network
  podman:
    external: true
